<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo — eulabs-widget</title>
    <!-- Após `npm run build`, sirva a raiz com `npx serve .` -->
    <link rel="stylesheet" href="./dist/eulabs-widget.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 1.5rem;
        background: #f5f5f5;
      }
      .hint {
        max-width: 42rem;
        margin-bottom: 1rem;
        padding: 0.75rem 1rem;
        background: #e8f4ea;
        border: 1px solid #9c9;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      #widget-eulabs-wrapper {
        max-width: 48rem;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <p class="hint">
      Este demo usa só os arquivos em <code>./dist/</code> (runtime <strong>embutido</strong> no pacote).
      Rode <code>npm run build</code> e <code>npx serve .</code> na raiz do repositório e abra
      <code>/demo.html</code>.
    </p>

    <div id="widget-eulabs-wrapper"></div>

    <script defer src="./dist/eulabs-widget.umd.js"></script>
    <script defer>
      ;(async function () {
        const mount = document.getElementById('widget-eulabs-wrapper')

        function showErr(msg) {
          mount.innerHTML = '<p style="color:#b00020">' + msg + '</p>'
        }

        const Loader = window.EulabsWidget
        if (typeof Loader !== 'function') {
          showErr(
            'O UMD não carregou (<code>window.EulabsWidget</code> ausente). Confirme <code>npm run build</code>, o caminho <code>./dist/eulabs-widget.umd.js</code> e abra via servidor HTTP (ex.: <code>npx serve .</code>), não <code>file://</code>.'
          )
          return
        }

        try {
          await new Loader({
            target: '#widget-eulabs-wrapper',
            theme: 'white',
            clientId: 10770,
            urlWL: 'https://www.eucatur.com.br/',
            urlAPI: 'https://api-v4.eucatur.com.br/sectionals?is_road_station=true',
            orientation: 'vertical',
            labelTexts: {
              origin: 'Origem?',
              destination: 'Para onde?',
              departureDate: 'Ida',
              returnDate: 'Volta',
              search: 'Buscar',
              toggle_go: 'Somente ida',
              toggle_go_and_back: 'Ida e volta',
            },
            calendarReposition: true,
            calendarNumberMonths: 2,
            useDefaultCss: true,
            customCss: null,
            customHeading: { enable: false, tag: null, content: null },
            tracking: { source: 'undefined', medium: 'undefined', campaign: 'undefined' },
            customOutput: { enable: false, parameter: '', where: 'after' },
            hasRadioButtons: true,
            gratuity: {
              enable: true,
              errorMessage: 'Consulta de gratuidade somente para viagens de ida',
              optionList: [
                { default: true, label: 'Passagem comum', value: 'common' },
                { default: false, label: 'Passagem com benefício', value: 'gratuity' },
              ],
            },
          }).init()
        } catch (e) {
          console.error(e)
          showErr('Erro ao iniciar o widget: ' + (e && e.message ? e.message : String(e)))
        }
      })()
    </script>
  </body>
</html>
